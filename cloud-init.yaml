#cloud-config

# ═══════════════════════════════════════════════════════════════════════════════
# GreatAegis vLLM Inference Server — GPU Droplet Startup
# ═══════════════════════════════════════════════════════════════════════════════
#
# Drop this in the "Startup scripts" box when creating a DO GPU Droplet
# with the vLLM / ROCm image.
#
# Swap MODEL_ID for other models if needed (see comments at MODEL_ID lines).

package_update: true
package_upgrade: false

write_files:

  # ── Environment file (single source of truth for model config) ──────────
  - path: /etc/vllm.env
    permissions: '0644'
    content: |
      # Model to serve.  ─── CHANGE THIS FOR DIFFERENT MODELS ───
      #   Qwen/Qwen3-0.6B         (~1.2 GB, lightweight, fast)
      #   zai-org/GLM-5.2-FP8      (ungated, ~20 GB FP8, ChatGLM family)
      MODEL_ID='Qwen/Qwen3-0.6B'
      MODEL_PATH='/mnt/models/Qwen/Qwen3-0.6B'
      HF_HOME='/mnt/models'
      VLLM_PORT='8000'

      # Uncomment for gated models (Mixtral, Llama, etc.)
      # HF_TOKEN='hf_your_token_here'

  # ── ROCm metrics server (telemetry for GreatAegis gateway) ───────────────
  - path: /usr/local/bin/rocm_metrics_server.py
    permissions: '0755'
    content: |
      #!/usr/bin/env python3
      import json, subprocess
      from http.server import HTTPServer, BaseHTTPRequestHandler
      class RocmMetricsHandler(BaseHTTPRequestHandler):
        def do_GET(self):
          if self.path == "/health":
            self._respond(200, {"status": "ok"})
          elif self.path == "/gpu":
            try:
              result = subprocess.run(["rocm-smi","--showmetrics","--json"],capture_output=True,text=True,timeout=10)
              if result.returncode != 0:
                self._respond(503,{"error":"rocm-smi exited non-zero","stderr":result.stderr.strip()}); return
              self._respond(200, json.loads(result.stdout))
            except FileNotFoundError: self._respond(503,{"error":"rocm-smi not found"})
            except subprocess.TimeoutExpired: self._respond(504,{"error":"rocm-smi timed out"})
            except json.JSONDecodeError as e: self._respond(502,{"error":f"rocm-smi output not JSON: {e}"})
            except Exception as e: self._respond(500,{"error":str(e)})
          else: self._respond(404,{"error":"not found"})
        def _respond(self, c, p):
          b = json.dumps(p).encode(); self.send_response(c)
          self.send_header("Content-Type","application/json"); self.send_header("Content-Length",str(len(b)))
          self.end_headers(); self.wfile.write(b)
        def log_message(self, *a): pass
      HTTPServer(("0.0.0.0",8001),RocmMetricsHandler).serve_forever()

  # ── systemd: vLLM inference server ─────────────────────────────────────
  - path: /etc/systemd/system/vllm.service
    permissions: '0644'
    content: |
      [Unit]
      Description=GreatAegis vLLM Inference Server
      Documentation=https://docs.vllm.ai/
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=root
      Group=root
      EnvironmentFile=/etc/vllm.env
      WorkingDirectory=/tmp

      ExecStartPre=/bin/sh -c '\
        if [ ! -d "$${MODEL_PATH}" ]; then \
          echo "[vllm] FATAL: model directory $${MODEL_PATH} not found — run model download first"; \
          exit 1; \
        fi; \
        echo "[vllm] Model path = $${MODEL_PATH}"; \
        echo "[vllm] ROCm version: $$(cat /opt/rocm/.info/version 2>/dev/null || echo unknown)"'

      ExecStart=/bin/bash -c '\
        exec python3 -m vllm.entrypoints.openai.api_server \
          --host 0.0.0.0 \
          --port ${VLLM_PORT} \
          --model ${MODEL_PATH} \
          --enforce-eager \
          --max-num-seqs 64 \
          --max-model-len 32768 \
          --gpu-memory-utilization 0.92 \
          --disable-log-requests'

      Restart=always
      RestartSec=10
      StandardOutput=journal
      StandardError=journal
      OOMScoreAdjust=-500
      TimeoutStartSec=600

      [Install]
      WantedBy=multi-user.target

  # ── systemd: ROCm metrics server ───────────────────────────────────────
  - path: /etc/systemd/system/rocm-metrics.service
    permissions: '0644'
    content: |
      [Unit]
      Description=GreatAegis ROCm Metrics Server
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User=root
      Group=root
      ExecStart=/usr/bin/python3 /usr/local/bin/rocm_metrics_server.py
      Restart=always
      RestartSec=5
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

runcmd:
  # ── Download model weights ───────────────────────────────────────────────
  - mkdir -p /mnt/models
  - |
    . /etc/vllm.env
    if [ -d "${MODEL_PATH}" ] && [ -n "$(ls -A ${MODEL_PATH} 2>/dev/null)" ]; then
      echo "[cloud-init] Model already cached at ${MODEL_PATH}, skipping download."
    else
      echo "[cloud-init] Downloading ${MODEL_ID} — this may take 10-30 min ..."
      if [ -n "${HF_TOKEN}" ]; then
        python3 -c "
import os
os.environ['HF_TOKEN'] = '${HF_TOKEN}'
from huggingface_hub import snapshot_download
snapshot_download('${MODEL_ID}', local_dir='${MODEL_PATH}', local_dir_use_symlinks=False)
"
      else
        python3 -c "
from huggingface_hub import snapshot_download
snapshot_download('${MODEL_ID}', local_dir='${MODEL_PATH}', local_dir_use_symlinks=False)
"
      fi
      echo "[cloud-init] Model download complete."
    fi

  # ── Enable & start services ─────────────────────────────────────────────
  - systemctl daemon-reload
  - systemctl enable vllm.service
  - systemctl start vllm.service
  - systemctl enable rocm-metrics.service
  - systemctl start rocm-metrics.service

final_message: |
  GreatAegis vLLM server is starting.
  Check status:  systemctl status vllm && systemctl status rocm-metrics
  Follow logs:   journalctl -u vllm -f  &&  journalctl -u rocm-metrics -f
  Health check:  curl http://localhost:8000/health
  Telemetry:     curl http://localhost:8001/gpu | jq .
