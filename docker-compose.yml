
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3060:3060"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8060:8060"
    environment:
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - GPU_PROMETHEUS_URL=${GPU_PROMETHEUS_URL:-}
      - ROCM_SMI_URL=${ROCM_SMI_URL:-}
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    restart: unless-stopped
